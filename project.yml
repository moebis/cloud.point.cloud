name: CloudPoint

options:
  deploymentTarget:
    macOS: "15.0"

configs:
  Debug: debug
  Release: release

packages:
  MetalSplatter:
    url: https://github.com/scier/MetalSplatter.git
    revision: 71ff248e3016ac43c0a9271e322538421b28c360

targets:
  CloudPoint:
    type: application
    platform: macOS
    sources:
      - path: CloudPoint
        excludes:
          - Resources/Info.plist
          - Resources/CloudPoint.entitlements
          - App/CloudPointApp 2.swift
    configFiles:
      Debug: Config/Base.xcconfig
      Release: Config/Base.xcconfig
    dependencies:
      - target: CloudPointWorkerLauncher
        embed: false
      - package: MetalSplatter
        product: MetalSplatter
      - package: MetalSplatter
        product: SplatIO
    postBuildScripts:
      - name: Embed Worker Launcher
        script: |
          mkdir -p "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers"
          cp "${BUILT_PRODUCTS_DIR}/CloudPointWorkerLauncher" "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Helpers/CloudPointWorkerLauncher"
        inputFiles:
          - "$(BUILT_PRODUCTS_DIR)/CloudPointWorkerLauncher"
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(CONTENTS_FOLDER_PATH)/Helpers/CloudPointWorkerLauncher"
      - name: Embed Release Worker Runtime
        basedOnDependencyAnalysis: false
        script: |
          if [ "${CONFIGURATION}" = "Release" ]; then
            "${SRCROOT}/scripts/package-worker-runtime" \
              "${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}/WorkerRuntime"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cloud.point.cloud.CloudPoint
        PRODUCT_BUNDLE_PACKAGE_TYPE: APPL
        INFOPLIST_FILE: CloudPoint/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: CloudPoint/Resources/CloudPoint.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
      configs:
        Release:
          CLOUDPOINT_WORKER_RUNTIME: ""

  CloudPointTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CloudPointTests
        excludes:
          - Info.plist
      - path: worker/tests/fixtures/courthouse
        type: folder
        buildPhase: resources
    dependencies:
      - target: CloudPoint
      - target: CloudPointMockWorker
      - target: CloudPointWorkerLauncher
    configFiles:
      Debug: Config/Base.xcconfig
      Release: Config/Base.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cloud.point.cloud.CloudPointTests
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CloudPointTests/Info.plist
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete

  CloudPointMockWorker:
    type: tool
    platform: macOS
    sources:
      - path: CloudPointMockWorker
      - path: CloudPoint/Domain/ProjectModels.swift
      - path: CloudPoint/Domain/ReconstructionMode.swift
      - path: CloudPoint/Engine/ReconstructionEngine.swift
      - path: CloudPoint/Engine/SharpWorkerProtocol.swift
      - path: CloudPoint/Engine/WorkerProtocol.swift
    configFiles:
      Debug: Config/Base.xcconfig
      Release: Config/Base.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cloud.point.cloud.CloudPointMockWorker
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete

  CloudPointWorkerLauncher:
    type: tool
    platform: macOS
    sources:
      - path: CloudPointWorkerLauncher
    configFiles:
      Debug: Config/Base.xcconfig
      Release: Config/Base.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cloud.point.cloud.CloudPointWorkerLauncher
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete

schemes:
  CloudPoint:
    build:
      targets:
        CloudPoint: all
    test:
      targets:
        - CloudPointTests
      environmentVariables:
        CLOUDPOINT_SMOKE_VIDEO: "$(CLOUDPOINT_SMOKE_VIDEO)"
        CLOUDPOINT_WORKER_RUNTIME: "$(CLOUDPOINT_WORKER_RUNTIME)"
        CLOUDPOINT_REAL_MODEL_DIR: "$(CLOUDPOINT_REAL_MODEL_DIR)"
        CLOUDPOINT_REAL_SHARP_PLY: "$(CLOUDPOINT_REAL_SHARP_PLY)"
        CLOUDPOINT_REAL_SHARP_CHECKPOINT: "$(CLOUDPOINT_REAL_SHARP_CHECKPOINT)"
        CLOUDPOINT_REAL_SHARP_FRAME: "$(CLOUDPOINT_REAL_SHARP_FRAME)"
  CloudPointTests:
    build:
      targets:
        CloudPointTests: all
    test:
      targets:
        - CloudPointTests
  CloudPointMockWorker:
    build:
      targets:
        CloudPointMockWorker: all
  CloudPointWorkerLauncher:
    build:
      targets:
        CloudPointWorkerLauncher: all
